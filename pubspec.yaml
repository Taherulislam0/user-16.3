  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^21.0.0
  path_provider: ^2.1.5
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.1.6
  flutter_svg: ^2.3.0
  country_code_picker: ^3.4.1
  pin_code_fields: ^8.0.1
  google_maps_flutter: ^2.17.1
