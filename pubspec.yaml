  path: ^1.9.1
  cached_network_image: ^3.4.1
  http_parser: ^4.1.2
  intl: ^0.20.2
  sign_in_with_apple: ^8.1.0
  dotted_border: ^3.1.0
  dotted_line: ^3.3.0
  flutter_slidable: ^4.0.3
  percent_indicator: ^4.2.5
  just_the_tooltip: ^0.0.12
  substring_highlight: ^1.0.33
  card_swiper: ^3.0.1
  emoji_picker_flutter: ^4.4.0
  file_picker: ^11.0.2
  carousel_slider: ^5.1.2
  webview_flutter_android: ^4.12.0
  webview_flutter_wkwebview: ^3.25.1
  dropdown_button2: ^2.3.9
  gradient_borders: ^1.0.4
  flutter_spinkit: ^5.2.2
  open_file: ^3.5.11
  flutter_pdfview: ^1.4.4
  readmore: ^3.0.0
  open_file_manager: ^2.0.1
  audioplayers: ^6.7.0
  syncfusion_flutter_pdfviewer: ^33.2.8
  firebase_auth: ^6.5.2
  flutter_inappwebview_ios: ^1.1.2
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  get_thumbnail_video: ^0.7.3
  archive: ^4.0.9
  video_player: ^2.11.1
  chewie: ^1.13.0
  syncfusion_flutter_datepicker: ^33.2.8
  syncfusion_flutter_core: ^33.2.8
  syncfusion_flutter_charts: ^33.2.8
  webview_flutter: ^4.13.1
  skeletonizer: ^2.1.3
  phone_numbers_parser: ^9.0.23
  go_router: ^17.2.3
  app_tracking_transparency: ^2.0.7
  app_links: ^7.1.1
  flutter_image_compress: ^2.4.0
  textfield_tags: ^2.0.2

dev_dependencies:
  flutter_lints: ^6.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.15.0

  flutter_test:
    sdk: flutter



flutter:
  uses-material-design: true
  config:
    disable-swift-package-manager: true

  assets:
    - assets/images/
    - assets/language/
    - assets/svg/

  fonts:
    - family: SF-Pro-Rounded-Regular
      fonts:
        - asset: assets/fonts/ubuntu/SF-Pro-Rounded-Regular.ttf
          weight: 400
        - asset: assets/fonts/ubuntu/SF-Pro-Rounded-Regular.ttf
          weight: 500
        - asset: assets/fonts/ubuntu/SF-Pro-Rounded-Regular.ttf
          weight: 600
